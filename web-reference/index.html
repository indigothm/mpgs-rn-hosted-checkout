<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tyro MPGS — Hosted Session Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- anti-clickjack for MPGS -->
  <style id="antiClickjack">body{display:none !important;}</style>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background-color: #020617;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 16px 12px;
    }

    .app-card {
      width: 100%;
      max-width: 420px;
      background: #0b1120;
      border-radius: 18px;
      border: 1px solid #111827;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.7);
      padding: 18px 16px;
      position: relative;
      overflow: hidden;
    }

    .app-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(99,102,241,0.18), transparent 60%),
        radial-gradient(circle at bottom left, rgba(16,185,129,0.14), transparent 60%);
      opacity: 0.8;
      pointer-events: none;
    }

    .app-card-inner {
      position: relative;
      z-index: 1;
    }

    .badge-pill {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #6366f1;
      background: rgba(99,102,241,0.16);
      border-radius: 999px;
      padding: 4px 10px;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .section-card {
      border-radius: 12px;
      border: 1px solid #1f2937;
      background: rgba(15,23,42,0.95);
      padding: 12px 10px;
      margin-bottom: 14px;
    }

    .form-label {
      font-size: 0.78rem;
      font-weight: 500;
      color: #9ca3af;
      margin-bottom: 3px;
    }

    .form-label-inline {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label-subtle {
      font-size: 0.7rem;
      color: #6b7280;
    }

    .form-control,
    .form-select {
      border-radius: 999px;
      border: 1px solid #111827;
      background-color: #020617;
      color: #e5e7eb;
      font-size: 0.9rem;
      height: 42px;
      padding: 0 14px;
    }

    .form-control[readonly] {
      background-color: #020617;
      cursor: default;
    }

    #log {
      white-space: pre-wrap;
      background: #020617;
      border-radius: 12px;
      border: 1px solid #1e293b;
      padding: 9px;
      font-size: 0.78rem;
      max-height: 400px;
      overflow: auto;
      margin-top: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .wallet-btn {
      border-radius: 999px;
      height: 40px;
      font-size: 0.85rem;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      width: 100%;
    }

    #challenge-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #challenge-container {
      width: 100%;
      max-width: 420px;
      height: 90vh;
      background: #fff;
      overflow: hidden;
      border-radius: 12px;
    }

    .error-box {
      padding: 0.5rem 0.75rem;
      border-radius: 0.25rem;
      background: #fdecea;
      color: #b30000;
      font-size: 0.875rem;
    }

    .field-error {
      border-color: #b30000 !important;
      box-shadow: 0 0 0 1px rgba(179, 0, 0, 0.2);
    }

  </style>
</head>

<body>
  <div class="app-shell">
    <div class="app-card">
      <div class="app-card-inner">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-2">
          <div>
            <h1 class="h5 mb-1">Tyro MPGS Checkout</h1>
            <div class="text-muted" style="font-size:0.8rem;">Hosted Session · Sandbox</div>
          </div>
        </div>

        <!-- Order section -->
        <div class="section-label">Order</div>
        <div class="section-card">
          <label for="amount" class="form-label form-label-inline">
            <span>Amount</span>
            <span class="label-subtle">AUD only</span>
          </label>
          <input id="amount" class="form-control" type="text" inputmode="decimal" value="10.00" />

          <!-- Hardcode currency to AUD (still exposed for your JS to read if needed) -->
          <input id="currency" type="hidden" value="AUD" />
        </div>

        <!-- Card section -->
        <div class="section-label">Card</div>
        <div class="section-card">

          <!-- Error area -->
          <div id="card-errors" class="error-box" style="display:none; margin-bottom: 0.75rem;">
            <!-- Populated by checkout.js -->
          </div>

          <!-- Card Number -->
          <label for="card-number" class="form-label form-label-inline">
            <span>Card number</span>
            <span class="label-subtle">Hosted field</span>
          </label>
          <input id="card-number" class="form-control mb-3" readonly />

          <!-- Expiry -->
          <label class="form-label">Expiry (MM / YY)</label>
          <div class="d-flex gap-2 mb-3">
            <input id="expiry-month" class="form-control" readonly />
            <input id="expiry-year" class="form-control" readonly />
          </div>

          <!-- CVV (now on its own line) -->
          <label for="security-code" class="form-label">CVV</label>
          <input id="security-code" class="form-control mb-3" readonly />

          <!-- Name on card -->
          <label for="cardholder-name" class="form-label">Name on card</label>
          <input id="cardholder-name" class="form-control mb-3" readonly />

          <!-- Save card + Pay -->
          <div class="d-flex justify-content-between align-items-center mt-2 flex-wrap gap-2">
            <div class="form-check d-flex align-items-center gap-2 mb-0">
              <input class="form-check-input" type="checkbox" id="save-card" />
              <label class="form-check-label" for="save-card" style="font-size:0.8rem;">Save card</label>
            </div>
            <button id="pay" type="button" class="btn btn-primary btn-primary-pill">
              Pay now
            </button>
          </div>

        </div>

        <!-- Wallets -->
        <div class="section-label">Wallets</div>
        <div class="row g-2 mb-2">
          <div class="col-6">
            <button id="apple-pay" class="wallet-btn" disabled> Apple Pay</button>
          </div>
          <div class="col-6">
            <button id="google-pay" class="wallet-btn" disabled>GPay</button>
          </div>
        </div>

        <!-- Log -->
        <div class="section-label">Log</div>
        <div id="log" class="log-empty">Waiting for events…</div>

      </div>
    </div>
  </div>
  <div id="challenge-overlay" style="display:none;">
    <div id="challenge-container"></div>
  </div>

  <!-- Scripts -->
  <script
    src="https://test-tyro.mtf.gateway.mastercard.com/static/threeDS/1.3.0/three-ds.min.js"
    data-error="threeDSErrorCallback"
    data-cancel="threeDSCancelCallback">
  </script>
  <script async src="https://pay.google.com/gp/p/js/pay.js"></script>
  <script type="module" src="./checkout.js"></script>
  <script type="module" src="./wallets.js"></script>

</body>
</html>
